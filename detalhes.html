<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Empenho | Technofer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fc; font-family: 'Segoe UI', Roboto, sans-serif; }
        .topbar { background: #003366; color: white; padding: 20px 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .topbar h4 { margin: 0; font-weight: bold; color: #00d2ff; }
        .container { max-width: 900px; margin-top: 40px; }
        .detalhes-card { background: white; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); padding: 30px; border-top: 5px solid #00d2ff; }
        .label-info { font-size: 0.85rem; color: #6c757d; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .valor-info { font-size: 1.1rem; color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .valor-destaque { font-size: 2rem; color: #dc3545; font-weight: bold; }
        .btn-voltar { background: #e2e8f0; color: #333; font-weight: bold; }
    </style>
</head>
<body>

<div class="topbar d-flex justify-content-between align-items-center">
    <div>
        <h4><i class="fa-solid fa-shield-halved"></i> TRANS<span style="color:white;">PORTAL</span></h4>
        <small>Portal da Transparência - Brás Pires/MG</small>
    </div>
    <a href="portal_premium.html" class="btn btn-voltar"><i class="fa-solid fa-arrow-left"></i> Voltar à Lista</a>
</div>

<div class="container">
    <div class="detalhes-card" id="conteudo-detalhes"></div>
</div>

<script src="dados_empenhos.js"></script>
<script>
    const formatarMoeda = (valor) => {
        let num = parseFloat(valor);
        if(isNaN(num)) return "R$ 0,00";
        return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    };

    const urlParams = new URLSearchParams(window.location.search);
    const idEmpenho = urlParams.get('id');
    const divConteudo = document.getElementById('conteudo-detalhes');

    window.onload = () => {
        if (!idEmpenho || typeof dadosEmpenhos === 'undefined') {
            divConteudo.innerHTML = `<div class="alert alert-danger"><b>Erro:</b> Ligação inválida.</div>`; return;
        }
        
        const empenho = dadosEmpenhos.find(l => l.Numero == idEmpenho);
        if (!empenho) {
            divConteudo.innerHTML = `<div class="alert alert-warning">Empenho não localizado.</div>`; return;
        }

        divConteudo.innerHTML = `
            <div class="d-flex justify-content-between align-items-start mb-4">
                <div>
                    <h3 class="mb-0 text-dark">Empenho Nº ${empenho.Numero}</h3>
                    <span class="badge bg-success mt-2"><i class="fa-solid fa-check"></i> Liquidado e Pago</span>
                </div>
                <div class="btn-group">
                    <button class="btn btn-outline-dark" onclick="window.print()"><i class="fa-solid fa-print"></i> PDF/Imprimir</button>
                    <button class="btn btn-outline-success" onclick="extrairUnico('csv')">CSV</button>
                    <button class="btn btn-outline-secondary" onclick="extrairUnico('txt')">TXT</button>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-md-8">
                    <div class="label-info">Credor / Fornecedor</div>
                    <div class="valor-info"><strong>${empenho.Credor || 'NÃO INFORMADO'}</strong></div>
                </div>
                <div class="col-md-4">
                    <div class="label-info">Data da Emissão</div>
                    <div class="valor-info"><i class="fa-regular fa-calendar"></i> ${empenho.Data}</div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <div class="label-info">Órgão / Secretaria Solicitante</div>
                    <div class="valor-info"><i class="fa-solid fa-building"></i> ${empenho.Secretaria || 'NÃO INFORMADA'}</div>
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-md-12 text-center p-4" style="background: #f8f9fa; border-radius: 8px; border: 1px dashed #ccc;">
                    <div class="label-info">Valor Total do Empenho</div>
                    <div class="valor-destaque">${formatarMoeda(empenho.Valor)}</div>
                </div>
            </div>
            <div class="mt-5 text-muted small text-center"><p><i class="fa-solid fa-lock"></i> Fonte de Dados: Portal Oficial (Lei 131/2009).</p></div>
        `;

        // Função para exportar apenas este recibo
        window.extrairUnico = function(formato) {
            let conteudo = "";
            let nomeFicheiro = `empenho_${empenho.Numero}.${formato}`;
            
            if(formato === 'csv') {
                conteudo = `Data;Numero;Credor;Secretaria;Valor\n${empenho.Data};${empenho.Numero};"${empenho.Credor}";"${empenho.Secretaria}";${empenho.Valor}`;
            } else {
                conteudo = `RECIBO DE EMPENHO - Nº ${empenho.Numero}\n\nDATA: ${empenho.Data}\nCREDOR: ${empenho.Credor}\nSETOR: ${empenho.Secretaria}\nVALOR: R$ ${empenho.Valor}`;
            }
            
            const blob = new Blob(["\ufeff" + conteudo], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = nomeFicheiro;
            link.click();
        };
    };
</script>
</body>
</html>
